<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <title>Test GNSS Služeb – Robotour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #wrapper {
            display: flex;
            height: 100%;
        }

        #viewer {
            flex: 1;
            background: #ffffdd;
            flex-direction: column;
            gap: 1rem;
            padding-left: 3rem;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #camOutput {
            background-color: #ffffdd;
            padding: 1rem;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        #controls {
            flex: 1;
            background: #eee;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        button {
            padding: 1rem;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
    <script>
        function fixHeight() {
            const h = window.innerHeight + "px";
            document.getElementById("wrapper").style.height = h;
        }
        window.addEventListener("load", fixHeight);
        window.addEventListener("resize", fixHeight);
    </script>

</head>

<body>
    <div id="wrapper">
        <div id="viewer">
            <div id="camOutput">Výstup z GNSS, PointPerfect a Heading</div>
        </div>

        <div id="controls">
            <button onclick="gnssCmd('ping')">Ping (všechny)</button>
            <button onclick="gnssCmd('status')">Status (všechny)</button>
            <hr />
            <button onclick="gnssCmd('start')">Start (všechny)</button>
            <button onclick="gnssCmd('stop')">Stop (všechny)</button>
            <hr />
            <button onclick="gnssCmd('data')">Data (pouze GNSS)</button>
            <button onclick="gnssCmd('heading')">Heading (pouze Heading)</button>
            <hr />
            <button onclick="location.href='/'">⏮ Zpět na hlavní panel</button>
        </div>
    </div>

    <script>
        const result = document.getElementById("camOutput");

        async function gnssCmd(cmd) {
            try {
                const r = await fetch(`/gnss/${cmd}`);
                if (!r.ok) throw new Error(await r.text());
                const data = await r.json();
                log(`✅ Odpověď na ${cmd}:\n` + JSON.stringify(data, null, 2));

            } catch (e) {
                log("❌ " + e.message);
            }
        }

        function log(t) { result.textContent = t; }
    </script>
</body>

</html>
