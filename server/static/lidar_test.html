<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Robotour - Lidar Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            box-sizing: border-box;
            border: 1px solid black;
        }

        /* Levý sloupec - textový log */
        #output {
            flex: 1;
            background-color: #ffffdd;
            padding: 1rem;
            padding-left: 2rem;
            overflow-y: auto;
            white-space: pre-wrap;
            box-sizing: border-box;
        }

        /* Prostřední sloupec - zobrazení skenu */
        #scan-viewport {
            flex: 1;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid black;
            border-right: 1px solid black;
            box-sizing: border-box;
        }

        #reflectivity-image {
            max-height: 95vh;
            max-width: 95%;
            height: auto;
            width: auto;
            object-fit: contain;
            image-rendering: pixelated;
            display: block;
        }

        /* Pravý sloupec - ovládání */
        #controls {
            flex: 1;
            background-color: #eeeeee;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            box-sizing: border-box;
        }

        button {
            padding: 0.8rem;
            font-size: 1.1rem;
            cursor: pointer;
        }

        hr {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 0.5rem 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <!-- Levý sloupec: Log -->
        <div id="output">Lidar Test - Výstup připraven</div>

        <!-- Prostřední sloupec: Obrázek -->
        <div id="scan-viewport">
            <img id="reflectivity-image"
                src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                alt="LiDAR BEV Scan">
        </div>

        <!-- Pravý sloupec: Ovládání -->
        <div id="controls">
            <button onclick="lidarCmd('status')">Status</button>
            <button onclick="lidarCmd('start')">Start</button>
            <button onclick="lidarCmd('distance')">Vzdálenost</button>
            <button onclick="lidarCmd('reflectivity')">Snímek (Reflect)</button>
            <button onclick="startLidarStream()">🔁 Stream</button>
            <button onclick="stopLidarStream()">⏹ Stop Stream</button>
            <button onclick="lidarCmd('stop')">Stop</button>
            <hr />
            <button onclick="location.href='/'">⏮ Zpět na hlavní panel</button>
        </div>
    </div>

    <script>
        let eventSource = null;

        function startLidarStream() {
            if (eventSource) {
                logOutput("⚠️ Stream už běží");
                return;
            }

            eventSource = new EventSource("/lidar_stream");

            eventSource.onmessage = function (event) {
                try {
                    const payload = JSON.parse(event.data);

                    // Vypíšeme vzdálenost do logu
                    logOutput("📡 " + payload.distance);

                    // Spolehlivé překreslení base64 obrázku pro Android WebView
                    if (payload.image) {
                        const tempImg = new Image();
                        tempImg.onload = function () {
                            document.getElementById("reflectivity-image").src = tempImg.src;
                        };
                        tempImg.src = "data:image/png;base64," + payload.image;
                    }
                } catch (e) {
                    logOutput("📡 " + event.data);
                }
            };

            eventSource.onerror = function () {
                logOutput("❌ Chyba ve streamu");
                stopLidarStream();
            };
        }

        function stopLidarStream() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                logOutput("🛑 Stream zastaven");
            } else {
                logOutput("⚠️ Stream neběží");
            }
        }

        function updateSizeInfo() {
            const info = [
                `window.innerWidth: ${window.innerWidth}`,
                `window.innerHeight: ${window.innerHeight}`,
                `clientWidth: ${document.documentElement.clientWidth}`,
                `clientHeight: ${document.documentElement.clientHeight}`
            ].join('\n');
        }

        function forceFullScreenLayout() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            document.documentElement.style.width = w + "px";
            document.documentElement.style.height = h + "px";
            document.body.style.width = w + "px";
            document.body.style.height = h + "px";
            updateSizeInfo();
        }

        async function lidarCmd(cmd) {
            try {
                const r = await fetch(`/lidar/${cmd}`);
                if (!r.ok) throw new Error(await r.text());
                const data = await r.json();

                if (cmd === 'reflectivity' && data.image) {
                    // Spolehlivé překreslení pro Android WebView
                    const tempImg = new Image();
                    tempImg.onload = function () {
                        document.getElementById("reflectivity-image").src = tempImg.src;
                    };
                    tempImg.src = "data:image/png;base64," + data.image;
                    logOutput(`✅ Snímek zobrazen:\n` + data.response);
                    //console.log(`✅ Snímek zobrazen:\n` + data.image);
                } else {
                    logOutput(`✅ Odpověď na ${cmd}:\n` + JSON.stringify(data, null, 2));
                }
            } catch (e) {
                logOutput("❌ " + e.message);
            }
        }

        function logOutput(text) {
            document.getElementById("output").textContent = text;
        }

        window.addEventListener("load", () => {
            forceFullScreenLayout();
        });

        window.addEventListener("resize", () => {
            forceFullScreenLayout();
        });
    </script>
</body>

</html>
