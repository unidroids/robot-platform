<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Robotour - Pilot Vision Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #eee;
            font-family: sans-serif;
        }

        #wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row;
            box-sizing: border-box;
        }

        #left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #444;
        }

        #status-bar {
            background-color: #333;
            padding: 1rem;
            font-size: 1.2rem;
            border-bottom: 2px solid #444;
            display: flex;
            justify-content: space-between;
        }

        #output {
            flex: 1;
            background-color: #111;
            padding: 1rem;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.95rem;
            color: #0f0;
        }

        #controls {
            flex: 1;
            background-color: #333;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        button {
            padding: 1rem;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        
        button.primary { background-color: #4CAF50; color: white; }
        button.warning { background-color: #ff9800; color: white; }
        button.danger { background-color: #e64d4d; color: white; }
        button.info { background-color: #2196F3; color: white; }
        button.default { background-color: #555; color: white; }
        button:hover { filter: brightness(1.1); }
    </style>
</head>

<body>
    <div id="wrapper">
        <div id="left-panel">
            <div id="status-bar">
                <span>🤖 Pilot-Vision Log Stream</span>
                <span id="api-status">Služba API: Připojování...</span>
            </div>
            <div id="output">Načítám výstup z logu...</div>
        </div>
        
        <div id="controls">
            <button class="info" onclick="pilotCmd('status')">Zjištění Statusu</button>
            <button class="default" onclick="pilotCmd('ping')">Ping</button>
            <hr style="border-color: #555; width: 100%;" />
            <button class="primary" onclick="pilotCmd('start')">▶️ START (Testovací jízda)</button>
            <button class="danger" onclick="pilotCmd('stop')">⏹️ STOP</button>
            <hr style="border-color: #555; width: 100%;" />
            <button class="warning" onclick="pilotCmd('pause')">⏸️ PAUSE</button>
            <button class="primary" onclick="pilotCmd('resume')">⏯️ RESUME</button>
            <hr style="border-color: #555; width: 100%;" />
            <button class="default" onclick="location.href='/'">⏮ Zpět na hlavní panel</button>
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById("output");
        const apiStatus = document.getElementById("api-status");
        
        // SSE for tailing log
        const eventSource = new EventSource("/pilot/log");
        
        eventSource.onopen = function() {
            outputDiv.innerHTML = "";
            apiStatus.textContent = "Služba API: ONLINE";
            apiStatus.style.color = "#4CAF50";
        };
        
        eventSource.onerror = function() {
            apiStatus.textContent = "Služba API: OFFLINE / RECONNECTING";
            apiStatus.style.color = "#e64d4d";
        };

        eventSource.onmessage = function(e) {
            // Vytvoříme řádek
            const line = document.createElement("div");
            line.textContent = e.data;
            
            // Barvičky podle obsahu
            if(e.data.includes("❌") || e.data.includes("Chyba")) line.style.color = "#ff4444";
            else if(e.data.includes("⚠️") || e.data.includes("PŘEKÁŽKA") || e.data.includes("Ztráta")) line.style.color = "#ffaa00";
            else if(e.data.includes("🚀") || e.data.includes("OK ->")) line.style.color = "#44ff44";
            else if(e.data.includes("🛑") || e.data.includes("⏸️")) line.style.color = "#ff8888";
            else line.style.color = "#cccccc";

            // Vložíme navrch! (reverse order)
            outputDiv.prepend(line);
            
            // Omezení historie na 200 řádků
            if(outputDiv.childNodes.length > 200) {
                outputDiv.removeChild(outputDiv.lastChild);
            }
        };

        async function pilotCmd(cmd) {
            try {
                const r = await fetch(`/pilot/cmd/${cmd}`);
                if (!r.ok) throw new Error(await r.text());
                const data = await r.json();
                
                // Dočasně vypíšeme zprávu od serveru taky do logu navrch (modře)
                const line = document.createElement("div");
                line.style.color = "#44ccff";
                line.style.fontWeight = "bold";
                line.textContent = `[API Command] ${cmd.toUpperCase()} -> ${data.response}`;
                outputDiv.prepend(line);
                
            } catch (e) {
                const line = document.createElement("div");
                line.style.color = "#ff4444";
                line.style.fontWeight = "bold";
                line.textContent = `[API Error] ${cmd.toUpperCase()} -> ${e.message}`;
                outputDiv.prepend(line);
            }
        }
    </script>
</body>

</html>
